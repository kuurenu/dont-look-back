<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DON'T LOOK AWAY</title><style>
:root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;overflow:hidden;background:#020102;color:#f7e9e9;font-family:system-ui,"Yu Gothic",sans-serif}body:after{content:"";position:fixed;inset:0;z-index:40;pointer-events:none;opacity:.13;background:repeating-linear-gradient(0deg,transparent 0 3px,#fff 4px 5px);mix-blend-mode:overlay}.shell{width:min(95vw,780px)}header{display:flex;justify-content:space-between;align-items:end;gap:12px;margin:0 3px 9px}h1{margin:0;font-size:clamp(1.3rem,4.2vw,2.7rem);letter-spacing:.17em;line-height:.9;text-shadow:2px 0 #a30020,-2px 0 #063c5b}.sub,.hud{margin:6px 0 0;font-size:.67rem;letter-spacing:.13em;color:#b8a3a3}.hud{text-align:right;line-height:1.85;color:#ffd0d8;font-variant-numeric:tabular-nums;white-space:nowrap}
#game{--flow:0px;position:relative;overflow:hidden;width:100%;aspect-ratio:16/10;border:1px solid #5e1022;background:#050205;cursor:none;touch-action:none;box-shadow:0 0 55px #7e001d55,inset 0 0 90px #000}#field{position:absolute;inset:-100% 0;background:radial-gradient(ellipse at 50% 90%,#310d18 0%,#10060a 36%,#010101 72%),repeating-linear-gradient(0deg,transparent 0 46px,#8423371c 47px 49px);transform:translateY(var(--flow))}#field:before{content:"";position:absolute;inset:0;opacity:.22;background:radial-gradient(ellipse at 12% 18%,#4e172333 0 2%,transparent 7%),radial-gradient(ellipse at 83% 64%,#4e172333 0 2%,transparent 8%);filter:blur(2px)}#field:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 70px,#b52e4310 72px 74px)}#game:after{content:"";position:absolute;z-index:25;inset:0;border:13px solid #0009;pointer-events:none;box-shadow:inset 0 0 75px #000}
.enemy{position:absolute;z-index:6;border-radius:50%;object-fit:cover;filter:contrast(1.5) saturate(.55) brightness(.82);box-shadow:0 0 15px 4px #bc002a8c,0 0 40px #180006;pointer-events:none;user-select:none}.enemy.boss{border:2px solid #ffd3da;box-shadow:0 0 30px 8px #c70030,0 0 80px #370009;filter:contrast(1.7) saturate(.7)}.orb{position:absolute;z-index:8;width:19px;height:13px;border-radius:50%;background:radial-gradient(ellipse at center,#f7d4c4 0 28%,#7a1c25 31% 48%,#220006 52% 67%,#9e142c 70% 82%,#300008 100%);box-shadow:0 0 7px 3px #c7062f,0 0 17px #4d0012;pointer-events:none;transform:translate(-50%,-50%) rotate(var(--eye-angle,0deg))}.orb:before{content:"";position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;transform:translate(-50%,-50%);background:#060000;box-shadow:0 0 2px #fff}.orb:after{content:"";position:absolute;right:78%;top:50%;width:22px;height:2px;transform:translateY(-50%);background:linear-gradient(90deg,#52001600,#a8002699);filter:blur(1px)}.player{position:absolute;z-index:14;width:19px;height:19px;border:2px solid #f7ffff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 5px #fff,0 0 17px 6px #1b7b93}.player:after{content:"";position:absolute;inset:5px;border-radius:50%;background:#aaf5ff}.reticle{position:absolute;z-index:18;width:28px;height:28px;border:1px solid #9bd9e7;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:.75}.reticle:before,.reticle:after{content:"";position:absolute;background:#bdefff;left:50%;top:50%;transform:translate(-50%,-50%)}.reticle:before{width:38px;height:1px}.reticle:after{height:38px;width:1px}.ofuda{position:absolute;z-index:12;width:32px;height:46px;display:grid;place-items:center;background:linear-gradient(90deg,#e2c98f,#fff4c9,#d7b972);color:#870015;border:1px solid #fff;border-radius:2px;box-shadow:0 0 12px 4px #fff2bd,0 0 24px #dfaa3c;transform:translate(-50%,-50%) rotate(-6deg);font-weight:900;font-size:1.2rem;pointer-events:none;animation:float .7s ease-in-out infinite alternate}.ofuda:after{content:"PICK UP";position:absolute;top:51px;color:#fff0c5;font:700 8px system-ui;letter-spacing:.05em;white-space:nowrap;text-shadow:0 1px 2px #000}@keyframes float{to{transform:translate(-50%,-50%) rotate(6deg) scale(1.08)}}.pulse{position:absolute;z-index:19;border-radius:50%;border:3px solid #fff5c4;box-shadow:0 0 35px 10px #fff4aa,0 0 100px #c90031;pointer-events:none;transform:translate(-50%,-50%)}.purge{position:absolute;z-index:22;right:18px;bottom:17px;min-width:108px;padding:10px 12px;border:1px solid #fff2ba;border-radius:5px;background:linear-gradient(135deg,#6e0719,#d72c3e);color:#fff6d8;box-shadow:0 0 16px #a40025;line-height:1.05;text-shadow:0 1px #35000b}.purge small{display:block;margin-top:4px;font-size:9px;letter-spacing:.1em}.purge:disabled{border-color:#52363a;background:#211518;color:#80696c;box-shadow:none;cursor:not-allowed}.notice{position:absolute;z-index:23;left:50%;top:17%;transform:translate(-50%,-10px);opacity:0;pointer-events:none;color:#fff4c0;font-weight:900;letter-spacing:.08em;text-align:center;text-shadow:0 0 7px #f9a02f,0 2px 2px #000;transition:.2s}.notice.show{opacity:1;transform:translate(-50%,0)}.overlay{position:absolute;z-index:30;inset:0;display:grid;place-items:center;padding:22px;text-align:center;background:#000b;backdrop-filter:blur(2px)}.card{max-width:520px}.card h2{margin:0;font-size:clamp(1.3rem,4vw,2rem);letter-spacing:.1em}.card p{line-height:1.85;color:#ddc8c8}button{padding:13px 30px;border:1px solid #ffe1e7;background:#f4dce0;color:#26040a;font:inherit;font-weight:800;letter-spacing:.14em;cursor:pointer}button:hover{background:#fff}.purge:hover{background:linear-gradient(135deg,#8b0d25,#f2485d);color:#fff}.hidden{display:none}.hit{animation:hit .12s steps(2) 4}@keyframes hit{50%{background:#76001b;filter:brightness(1.8)}}@media(max-width:520px){.shell{width:100vw}header{padding:0 10px}.sub{display:none}#game{aspect-ratio:1.13;border-left:0;border-right:0}.purge{right:14px;bottom:14px;min-width:100px;padding:13px 10px}.notice{top:15%;font-size:.82rem}}
</style></head><body><main class="shell"><header><div><h1>DON'T LOOK AWAY</h1><p class="sub">DODGE THEM. FIND THE WARD.</p></div><p class="hud">SCORE <span id="score">000000</span><br>STAGE <span id="stage">1</span> &nbsp;|&nbsp; WARDS <span id="wards">0</span></p></header><section id="game"><div id="field"></div><div id="player" class="player"></div><div id="reticle" class="reticle"></div><div id="notice" class="notice"></div><button id="purge" class="purge" disabled>祓い<small>WARD 0 / 3</small></button><div id="overlay" class="overlay"><div class="card"><h2>DON'T FIGHT THEM.</h2><p>&#38996;&#12399;&#20498;&#12379;&#12394;&#12356;&#12290;&#12383;&#12384;&#12289;&#36991;&#12369;&#12427;&#12375;&#12363;&#12394;&#12356;&#12290;<br>&#30690;&#21360;&#12461;&#12540;&#65295;WASD&#65288;&#12414;&#12383;&#12399;&#12510;&#12454;&#12473;&#65289;&#12391;&#36867;&#12370;&#12289;&#21361;&#38522;&#12394;&#22580;&#25152;&#12395;&#20986;&#12427;&#12300;&#31070;&#31038;&#12398;&#12362;&#26413;&#12301;&#12434;&#25342;&#12360;&#12290;<br><b>&#12362;&#26413;&#12434;&#25342;&#12360;&#12383;&#12425;&#12289;&#30011;&#38754;&#21491;&#19979;&#12398;&#12300;&#31075;&#12356;&#12301;&#12434;&#25276;&#12375;&#12390;&#19968;&#26044;&#12395;&#32676;&#12428;&#12434;&#25187;&#12356;&#36864;&#12369;&#12429;&#12290;</b></p><button id="start">ENTER THE NIGHT</button></div></div></section></main><script>
const game=document.querySelector('#game'),player=document.querySelector('#player'),reticle=document.querySelector('#reticle'),overlay=document.querySelector('#overlay'),scoreEl=document.querySelector('#score'),stageEl=document.querySelector('#stage'),wardsEl=document.querySelector('#wards'),purgeBtn=document.querySelector('#purge'),notice=document.querySelector('#notice');const faces=['9205904d.jpg','b2915aab.jpg','cb754493.jpg','dab3b287.jpg','db9c07a2.jpg','07eaf8fb.jpg','cd7724c7.jpg'];const cap=(v,a,b)=>Math.max(a,Math.min(b,v));let live=false,start=0,last=0,spawn=0,itemClock=0,bossAt=30,score=0,wards=0,p={x:.5,y:.82},cursor={x:.5,y:.3},keys={},enemies=[],orbs=[],items=[],pulses=[];
function updatePos(){player.style.left=`${p.x*100}%`;player.style.top=`${p.y*100}%`;reticle.style.left=`${cursor.x*100}%`;reticle.style.top=`${cursor.y*100}%`}function aim(x,y){const r=game.getBoundingClientRect();cursor.x=cap((x-r.left)/r.width,0,1);cursor.y=cap((y-r.top)/r.height,0,1);if(live&&!Object.values(keys).some(Boolean)){p.x=cap(cursor.x,.03,.97);p.y=cap(cursor.y,.05,.95)}updatePos()}game.addEventListener('pointermove',e=>aim(e.clientX,e.clientY));game.addEventListener('pointerdown',e=>aim(e.clientX,e.clientY));addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(e.key)){keys[e.key.toLowerCase()]=true;e.preventDefault()}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
function enemy(x,y,size,boss=false){const el=document.createElement('img');el.className=`enemy${boss?' boss':''}`;el.src=faces[(Math.random()*faces.length)|0];el.style.width=el.style.height=`${size}px`;game.insertBefore(el,player);enemies.push({el,x,y,size,boss,age:0,vx:(Math.random()-.5)*.09,vy:boss?.048:.07+Math.random()*.04,fire:boss?.45:.8+Math.random()*.5,dead:false})}function orb(x,y,vx,vy){const el=document.createElement('i');el.className='orb';game.insertBefore(el,player);orbs.push({el,x,y,vx,vy})}function shotFan(e,n){const toward=Math.atan2(p.y-e.y,p.x-e.x);for(let i=0;i<n;i++){const a=toward+(i-(n-1)/2)*.18;orb(e.x,e.y,Math.cos(a)*.29,Math.sin(a)*.29)}}
function refreshWard(){wardsEl.textContent=wards;purgeBtn.disabled=wards===0;purgeBtn.querySelector('small').textContent=`WARD ${wards} / 3`}function flash(text){notice.textContent=text;notice.classList.add('show');setTimeout(()=>notice.classList.remove('show'),1600)}function dropWard(){const x=.13+Math.random()*.74,y=.18+Math.random()*.45,el=document.createElement('b');el.className='ofuda';el.textContent='祓';el.style.left=`${x*100}%`;el.style.top=`${y*100}%`;game.insertBefore(el,player);items.push({el,x,y,life:10})}function purge(){if(!wards)return;wards--;refreshWard();flash('PURIFIED — THE WAY IS CLEAR');score+=700;scoreEl.textContent=score.toString().padStart(6,'0');const el=document.createElement('i');el.className='pulse';el.style.left=`${p.x*100}%`;el.style.top=`${p.y*100}%`;game.insertBefore(el,player);pulses.push({el,life:.8});for(const o of orbs)o.el.remove();orbs=[];for(const e of enemies){e.el.remove();e.dead=true}enemies=[]}purgeBtn.addEventListener('click',e=>{e.stopPropagation();purge()});addEventListener('keydown',e=>{if(live&&(e.key===' '||e.key==='z'||e.key==='Z')){e.preventDefault();purge()}});
function die(){live=false;[...enemies,...orbs,...items,...pulses].forEach(o=>o.el.remove());enemies=[];orbs=[];items=[];pulses=[];game.classList.add('hit');setTimeout(()=>game.classList.remove('hit'),500);overlay.classList.remove('hidden');overlay.innerHTML=`<div class="card"><h2>YOU LOOKED TOO LONG.</h2><p>SCORE ${score.toString().padStart(6,'0')}<br>&#12362;&#26413;&#12399;&#12289;&#20108;&#24230;&#12392;&#21516;&#12376;&#22580;&#25152;&#12395;&#12399;&#33853;&#12385;&#12390;&#12356;&#12394;&#12356;&#12290;</p><button id="start">TRY AGAIN</button></div>`;document.querySelector('#start').addEventListener('click',begin,{once:true})}
function frame(now){if(!live)return;const dt=Math.min(.035,(now-last)/1000),t=(now-start)/1000,d=4+t/14;last=now;game.style.setProperty('--flow',`${(t*(190+d*9))%92}px`);stageEl.textContent=Math.min(6,Math.floor(t/30)+1);const sp=.56*dt;if(keys.arrowup||keys.w)p.y-=sp;if(keys.arrowdown||keys.s)p.y+=sp;if(keys.arrowleft||keys.a)p.x-=sp;if(keys.arrowright||keys.d)p.x+=sp;p.x=cap(p.x,.03,.97);p.y=cap(p.y,.05,.95);updatePos();spawn+=dt;itemClock+=dt;if(spawn>Math.max(.5,1.35-d*.018)){for(let i=0;i<1+Math.floor(d*.12);i++)enemy(.07+Math.random()*.86,-.1-i*.12,44+Math.random()*42);spawn=0}if(t>bossAt){enemy(.2+Math.random()*.6,-.18,145+Math.min(80,d*2),true);bossAt+=30}if(itemClock>10+Math.random()*4){dropWard();itemClock=0}
for(const e of enemies){e.age+=dt;e.x+=e.vx*dt;e.y+=e.vy*dt;e.fire-=dt;e.el.style.left=`${e.x*100}%`;e.el.style.top=`${e.y*100}%`;e.el.style.transform=`translate(-50%,-50%) rotate(${Math.sin(e.age*1.7)*5}deg)`;if(e.fire<0){shotFan(e,e.boss?7+Math.floor(d*.08):2+Math.floor(d*.05));e.fire=e.boss?.78:1.25}if(Math.hypot(p.x-e.x,p.y-e.y)<e.size/1500+.02)return die()}for(const o of orbs){o.x+=o.vx*dt;o.y+=o.vy*dt;o.el.style.left=`${o.x*100}%`;o.el.style.top=`${o.y*100}%`;o.el.style.setProperty('--eye-angle',`${Math.atan2(o.vy,o.vx)*180/Math.PI}deg`);if(Math.hypot(p.x-o.x,p.y-o.y)<.027)return die()}for(const item of items){item.life-=dt;if(item.life>0&&Math.hypot(p.x-item.x,p.y-item.y)<.06){item.el.remove();item.life=0;wards=Math.min(3,wards+1);refreshWard();flash('OFUDA ACQUIRED — PRESS PURGE');score+=300;scoreEl.textContent=score.toString().padStart(6,'0')}}enemies=enemies.filter(e=>{const ok=!e.dead&&e.x>-.25&&e.x<1.25&&e.y<1.3;if(!ok)e.el.remove();return ok});orbs=orbs.filter(o=>{const ok=o.x>-.1&&o.x<1.1&&o.y>-.15&&o.y<1.2;if(!ok)o.el.remove();return ok});items=items.filter(i=>{if(i.life<=0)i.el.remove();return i.life>0});pulses=pulses.filter(x=>{x.life-=dt;const size=(1-x.life/.8)*900;x.el.style.width=x.el.style.height=`${size}px`;x.el.style.opacity=x.life/.8;if(x.life<=0)x.el.remove();return x.life>0});score+=Math.floor(dt*8);scoreEl.textContent=score.toString().padStart(6,'0');requestAnimationFrame(frame)}
function begin(){[...enemies,...orbs,...items,...pulses].forEach(o=>o.el.remove());enemies=[];orbs=[];items=[];pulses=[];score=0;wards=0;bossAt=30;scoreEl.textContent='000000';refreshWard();p={x:.5,y:.82};cursor={x:.5,y:.3};updatePos();overlay.classList.add('hidden');start=performance.now();last=start;spawn=.7;itemClock=6;live=true;requestAnimationFrame(frame)}document.querySelector('#start').addEventListener('click',begin);refreshWard();updatePos();
</script></body></html>
