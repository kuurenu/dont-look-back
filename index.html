<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DO NOT LOOK BACK</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;overflow:hidden;background:#010101;color:#eee;font-family:system-ui,"Yu Gothic",sans-serif}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:20;opacity:.18;background:repeating-linear-gradient(0deg,transparent 0 3px,#fff 4px 5px);mix-blend-mode:soft-light}.shell{width:min(94vw,740px)}
    header{display:flex;justify-content:space-between;align-items:end;margin:0 2px 10px;gap:12px}h1{margin:0;font-size:clamp(1.35rem,4vw,2.6rem);letter-spacing:.23em;line-height:.95;color:#f5e8e8;text-shadow:3px 0 #8e0000,-2px 0 #002c59}.sub,.hud{margin:6px 0 0;font-size:.67rem;letter-spacing:.15em;color:#a89a9a}.hud{color:#d9b9b9;text-align:right;line-height:1.9;font-variant-numeric:tabular-nums;white-space:nowrap}
    #game{--scroll:0px;position:relative;width:100%;aspect-ratio:16/10;overflow:hidden;touch-action:none;cursor:none;border:1px solid #3a090d;background:#030304;box-shadow:0 0 60px #45000d66,inset 0 0 100px #000}
    #hall{position:absolute;inset:-120% 0;background:linear-gradient(90deg,#000 0%,#080608 18%,#151012 50%,#080608 82%,#000 100%),repeating-linear-gradient(0deg,transparent 0 58px,#55152028 59px 61px);transform:translateY(var(--scroll));opacity:.88}#hall:before,#hall:after{content:"";position:absolute;top:0;bottom:0;width:20%;background:repeating-linear-gradient(0deg,transparent 0 90px,#74233124 94px 97px);filter:blur(1px)}#hall:before{left:8%;transform:skewX(-8deg)}#hall:after{right:8%;transform:skewX(8deg)}
    #game:after{content:"";position:absolute;inset:0;z-index:15;pointer-events:none;border:15px solid #000a;box-shadow:inset 0 0 70px #000}.ghost{position:absolute;z-index:5;border-radius:50%;object-fit:cover;object-position:center;pointer-events:none;user-select:none;filter:grayscale(.3) contrast(1.45) brightness(.8);box-shadow:0 0 15px 4px #b4002080}.ghost.major{border:2px solid #bc1028;box-shadow:0 0 30px 7px #b0002999;filter:grayscale(.15) contrast(1.65) brightness(.95)}
    .echo{position:absolute;z-index:2;border-radius:50%;object-fit:cover;opacity:.1;filter:grayscale(1) blur(1px);pointer-events:none}.player{position:absolute;z-index:12;width:19px;height:19px;border:1px solid #ffe4e4;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 4px #fff,0 0 17px 5px #ad001b}.player:before,.player:after{content:"";position:absolute;background:#fff5f5;left:50%;top:50%;transform:translate(-50%,-50%)}.player:before{width:1px;height:28px}.player:after{width:28px;height:1px}
    .overlay{position:absolute;inset:0;z-index:30;display:grid;place-items:center;padding:22px;text-align:center;background:#000b;backdrop-filter:blur(2px)}.card{max-width:510px}.card h2{margin:0;font-size:clamp(1.3rem,4vw,2rem);letter-spacing:.1em}.card p{margin:15px 0 22px;font-size:clamp(.79rem,2.1vw,1rem);line-height:1.85;color:#d0c2c2}button{border:1px solid #f1d7d7;background:#e8d4d4;color:#210406;padding:13px 28px;font:inherit;font-weight:800;letter-spacing:.14em;cursor:pointer}button:hover{background:#fff;transform:translateY(-1px)}.hidden{display:none}.hurt{animation:hurt .12s steps(2) 5}@keyframes hurt{50%{filter:brightness(1.7);background:#57000b}}@media(max-width:520px){.shell{width:100vw}header{padding:0 12px}.sub{display:none}#game{aspect-ratio:1.18;border-left:0;border-right:0}}
  </style>
</head>
<body>
  <main class="shell"><header><div><h1>DON'T LOOK BACK</h1><p class="sub">THE HALLWAY IS FOLLOWING YOU</p></div><p class="hud">DISTANCE <span id="distance">00000</span>m<br>TIME <span id="time">180</span> &nbsp;|&nbsp; NIGHT <span id="night">1</span></p></header>
    <section id="game" aria-label="Horror survival game"><div id="hall"></div><div id="player" class="player"></div><div id="overlay" class="overlay"><div class="card"><h2>DON'T TURN AROUND.</h2><p>&#38996;&#12364;&#35211;&#12360;&#12383;&#12425;&#12289;&#12381;&#12428;&#12399;&#12418;&#12358;&#36817;&#12356;&#12290;<br>&#12510;&#12454;&#12473;&#65295;&#12479;&#12483;&#12481;&#12414;&#12383;&#12399;&#30690;&#21360;&#12461;&#12540;&#12391;&#12289;180&#31186;&#38291;&#36867;&#12370;&#32154;&#12369;&#12429;&#12290;<br>&#26368;&#21021;&#12398;&#19968;&#31186;&#12363;&#12425;&#12289;&#20204;&#12425;&#12399;&#26469;&#12427;&#12290;</p><button id="start">RUN</button></div></div></section>
  </main>
  <script>
    const DURATION=180;
    const images=['9205904d.jpg','b2915aab.jpg','cb754493.jpg','dab3b287.jpg','db9c07a2.jpg','07eaf8fb.jpg','cd7724c7.jpg','442f24bc.jpg','maxresdefault.jpg','sddefault.jpg','unnamed.webp'];
    const game=document.querySelector('#game'),player=document.querySelector('#player'),overlay=document.querySelector('#overlay'),distanceEl=document.querySelector('#distance'),timeEl=document.querySelector('#time'),nightEl=document.querySelector('#night');
    let alive=false,startAt=0,last=0,spawnTick=0,patternTick=0,scroll=0,dist=0,p={x:.5,y:.82},ghosts=[],echoes=[],held={};
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
    function setPlayer(){player.style.left=`${p.x*100}%`;player.style.top=`${p.y*100}%`}
    function point(x,y){const r=game.getBoundingClientRect();p.x=clamp((x-r.left)/r.width,.025,.975);p.y=clamp((y-r.top)/r.height,.045,.95);setPlayer()}
    game.addEventListener('pointermove',e=>alive&&point(e.clientX,e.clientY));game.addEventListener('pointerdown',e=>alive&&point(e.clientX,e.clientY));
    addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){held[e.key]=true;e.preventDefault()}});addEventListener('keyup',e=>held[e.key]=false);
    function addGhost(x,y,vx,vy,size,major=false,sway=0){const el=document.createElement('img');el.className=`ghost${major?' major':''}`;el.src=images[(Math.random()*images.length)|0];el.style.width=el.style.height=`${size}px`;game.insertBefore(el,player);ghosts.push({el,x,y,vx,vy,size,r:size*.38,age:0,sway})}
    function addEcho(){const el=document.createElement('img');el.className='echo';el.src=images[(Math.random()*images.length)|0];const size=120+Math.random()*160;el.style.width=el.style.height=`${size}px`;el.style.left=`${Math.random()*100}%`;el.style.top=`${Math.random()*100}%`;game.insertBefore(el,player);echoes.push({el,life:1.2})}
    function rain(d){const n=5+Math.floor(d*.42);for(let i=0;i<n;i++){const x=.04+Math.random()*.92;addGhost(x,-.12-i*.09,(Math.random()-.5)*.24,.32+d*.027,45+Math.random()*48,false,(Math.random()-.5)*.13)}}
    function fan(d){const n=7+Math.floor(d*.35);for(let i=0;i<n;i++){const x=(i+1)/(n+1);addGhost(x,-.13,(p.x-x)*(.18+d*.014),.31+d*.025,48+Math.random()*32,i%5===0,(Math.random()-.5)*.1)}}
    function gate(d){const gap=.1+Math.max(0,.12-d*.006),c=.15+Math.random()*.7;for(let x=.035;x<1;x+=.075){if(Math.abs(x-c)>gap)addGhost(x,-.12,(c-x)*.08,.37+d*.024,43,d>20&&Math.random()<.35,0)}}
    function watcher(d){const x=.2+Math.random()*.6;addGhost(x,-.27,(p.x-x)*.11,.19+d*.018,145+Math.min(100,d*3),true,.04);addEcho()}
    function pattern(d){const choices=[fan,gate,watcher];choices[(Math.random()*choices.length)|0](d);if(d>24&&Math.random()<.65)setTimeout(()=>alive&&rain(d),190)}
    function end(win){alive=false;ghosts.forEach(g=>g.el.remove());echoes.forEach(e=>e.el.remove());ghosts=[];echoes=[];overlay.classList.remove('hidden');overlay.innerHTML=`<div class="card"><h2>${win?'YOU MADE IT OUT.':'IT WAS BEHIND YOU.'}</h2><p>${win?'18,000m&#12290;&#12381;&#12428;&#12391;&#12418;&#12289;&#26368;&#24460;&#12414;&#12391;&#12497;&#12540;&#12488;&#12398;&#38899;&#12399;&#12375;&#12394;&#12363;&#12387;&#12383;&#12290;':`&#21040;&#36948;&#36317;&#38626;&#65306;${Math.floor(dist).toString().padStart(5,'0')}m<br>&#25429;&#12414;&#12387;&#12383;&#12398;&#12399;&#12289;&#12383;&#12384;&#19968;&#26522;&#12398;&#38996;&#12384;&#12387;&#12383;&#12290;`}</p><button id="start">${win?'RUN AGAIN':'TRY AGAIN'}</button></div>`;document.querySelector('#start').addEventListener('click',begin,{once:true})}
    function frame(now){if(!alive)return;const dt=Math.min(.035,(now-last)/1000),t=(now-startAt)/1000,d=16+t/7;last=now;dist=Math.min(18000,t*100);distanceEl.textContent=Math.floor(dist).toString().padStart(5,'0');timeEl.textContent=Math.max(0,Math.ceil(DURATION-t));nightEl.textContent=Math.min(6,Math.floor(t/30)+1);scroll=(scroll+dt*(360+d*12))%120;game.style.setProperty('--scroll',`${scroll}px`);
      const s=.58*dt;if(held.ArrowUp)p.y-=s;if(held.ArrowDown)p.y+=s;if(held.ArrowLeft)p.x-=s;if(held.ArrowRight)p.x+=s;p.x=clamp(p.x,.025,.975);p.y=clamp(p.y,.045,.95);setPlayer();spawnTick+=dt;patternTick+=dt;if(spawnTick>Math.max(.33,.72-d*.011)){rain(d);spawnTick=0}if(patternTick>Math.max(1.5,3.5-d*.045)){pattern(d);patternTick=0}
      const r=game.getBoundingClientRect(),px=p.x*r.width,py=p.y*r.height;for(const g of ghosts){g.age+=dt;g.x+=g.vx*dt+Math.sin(g.age*4)*g.sway*dt;g.y+=g.vy*dt;const scale=1+Math.max(0,g.y)*.12;g.el.style.left=`${g.x*100}%`;g.el.style.top=`${g.y*100}%`;g.el.style.transform=`translate(-50%,-50%) scale(${scale}) rotate(${Math.sin(g.age*2)*5}deg)`;if(Math.hypot(px-g.x*r.width,py-g.y*r.height)<g.r*scale+10){game.classList.add('hurt');setTimeout(()=>game.classList.remove('hurt'),600);end(false);return}}
      ghosts=ghosts.filter(g=>{const keep=g.x>-.35&&g.x<1.35&&g.y>-.35&&g.y<1.3;if(!keep)g.el.remove();return keep});echoes=echoes.filter(e=>{e.life-=dt;e.el.style.opacity=Math.max(0,e.life*.08);if(e.life<=0)e.el.remove();return e.life>0});if(t>=DURATION){end(true);return}requestAnimationFrame(frame)}
    function begin(){ghosts.forEach(g=>g.el.remove());echoes.forEach(e=>e.el.remove());ghosts=[];echoes=[];p={x:.5,y:.82};dist=0;setPlayer();overlay.classList.add('hidden');startAt=performance.now();last=startAt;spawnTick=.64;patternTick=2.75;alive=true;requestAnimationFrame(frame)}
    document.querySelector('#start').addEventListener('click',begin);setPlayer();
  </script>
</body>
</html>
